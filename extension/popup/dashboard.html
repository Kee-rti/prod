<!DOCTYPE html>
<html>
<head>
  <title>Focus Tracker</title>
  <style>
    body { width: 300px; padding: 10px; font-family: 'Segoe UI', sans-serif; }
    h2 { margin-top: 0; font-size: 18px; }
    .stats { display: flex; justify-content: space-between; margin-bottom: 15px; }
    .stat-box { text-align: center; background: #f5f5f5; padding: 10px; border-radius: 5px; flex: 1; margin: 0 5px; }
    .stat-value { font-size: 20px; font-weight: bold; }
    .stat-label { font-size: 12px; color: #666; }
    canvas { width: 100%; height: 200px; }
  </style>

</head>
<body>
  <h2>Focus Tracker</h2>
  
  <div class="stats">
    <div class="stat-box">
      <div class="stat-value" id="focused-time">0m</div>
      <div class="stat-label">Focused</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="distracted-time">0m</div>
      <div class="stat-label">Distracted</div>
    </div>
  </div>

  <canvas id="chart"></canvas>
  
  <div id="demo" style="margin-top:12px; padding:10px; background:#fff; border-radius:5px; font-size:12px;">
    <div style="font-weight:bold; margin-bottom:6px;">Quick Demo</div>
    <div style="display:flex; gap:6px; margin-bottom:6px;">
      <input id="inp-duration" type="number" placeholder="duration(s)" style="flex:1; padding:6px;" />
      <input id="inp-scroll" type="number" placeholder="scroll" style="flex:1; padding:6px;" />
    </div>
    <div style="display:flex; gap:6px; margin-bottom:6px;">
      <input id="inp-keys" type="number" placeholder="keys" style="flex:1; padding:6px;" />
      <input id="inp-switches" type="number" placeholder="switches" style="flex:1; padding:6px;" />
    </div>
    <button id="predict-btn" style="width:100%; padding:8px; background:#1976d2; color:#fff; border:none; border-radius:4px; cursor:pointer;">Predict (XGB)</button>
    <div id="predict-result" style="margin-top:8px; font-size:13px; text-align:center; color:#333;">Model not loaded</div>
  </div>
  
  <div id="last-session" style="margin-top:15px; padding:10px; background:#f9f9f9; border-radius:5px; font-size:12px; text-align:center;">
    <div style="font-weight:bold; margin-bottom:4px;">Last Session</div>
    <div id="session-reason" style="color:#666;">No data yet</div>
  </div>
  
  <button id="reset-btn" style="width:100%; padding:8px; margin-top:10px; background:#eee; border:none; border-radius:4px; cursor:pointer;">Reset History</button>
  
  <script src="../lib/xgb_compiled.js"></script>
  <script src="../lib/inference.js"></script>
  <script src="popup.js"></script>
</body>
</html>
